<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Push Notifications</title>
</head>
<body>
  <h1>Pokémon Push Server</h1>

  <!-- Formulario de Registro -->
  <div id="authSection">
    <h2>Registro</h2>
    <input id="registerEmail" type="email" placeholder="tu@email.com" />
    <input id="registerPassword" type="password" placeholder="Contraseña" />
    <button id="registerBtn">Registrarse</button>

    <h2>Login</h2>
    <input id="loginEmail" type="email" placeholder="tu@email.com" />
    <input id="loginPassword" type="password" placeholder="Contraseña" />
    <button id="loginBtn">Iniciar Sesión</button>
  </div>

  <!-- Sección de usuario logueado -->
  <div id="userSection" style="display: none;">
    <h2>Bienvenido, <span id="userEmail"></span></h2>
    <button id="logoutBtn">Cerrar Sesión</button>

    <p>Registra tu navegador para recibir invitaciones y retos.</p>

    <label>
      Tu email:
      <input id="email" type="email" placeholder="tu@email.com" />
    </label>
    <button id="subscribeBtn">Suscribirse a notificaciones</button>

    <h2>Enviar prueba</h2>
    <label>
      Desde:
      <input id="from" type="text" placeholder="ash@example.com" />
    </label>
    <label>
      A:
      <input id="to" type="email" placeholder="misty@example.com" />
    </label>
    <button id="inviteBtn">Enviar invitación</button>
    <button id="battleBtn">Enviar reto</button>

    <h2>Buscar Pokémon</h2>
    <input id="pokemonSearch" type="text" placeholder="Nombre o ID del Pokémon" />
    <button id="searchBtn">Buscar</button>
    <div id="pokemonResult"></div>

    <h2>Favoritos</h2>
    <button id="loadFavoritesBtn">Cargar mis favoritos</button>
    <div id="favoritesList"></div>
  </div>

  <div id="status"></div>
  <script src="app.js"></script>
</body>
</html>
